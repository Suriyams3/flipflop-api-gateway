server:
  port: 8080

spring:
  application:
    name: flipflop-api-gateway

  cloud:
    gateway:
      routes:
        - id: account_details_route
          # 1. Point this to a standard, clean local property name
          uri: ${account.service.url}
          predicates:
            - Path=/account-service/**
          filters:
            - RewritePath=/account-service/(?<segment>.*), /$\{segment}

        - id: credit_card_route
          uri: ${creditcard.service.url}
          predicates:
            - Path=/creditcard-service/**
          filters:
            - RewritePath=/creditcard-service/(?<segment>.*), /$\{segment}

# 2. Declare the actual property substitution maps at the root level of the file
account:
  service:
    url: http://${ACCOUNT_SERVICE_HOST:localhost}:8081

creditcard:
  service:
    url: http://${CREDITCARD_SERVICE_HOST:localhost}:8082